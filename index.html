            <form class="materials__filters">
                <ul class="materials__tag-list">

                    <li class="materials__tag-item">
                        <label class="materials__tag">
                            <input class="materials__checkbox" type="checkbox" name="tag-all" value="all">

                                <img src="images/smiling_face_emoji.png" class="materials__icon" alt="">

                        </label>
                    </li>

                    <li class="materials__tag-item">
                        <label class="materials__tag">
                            <input class="materials__checkbox" type="checkbox" name="tag-self-esteem"

                        </label>
                    </li>

                    <li class="materials__tag-item">
                        <label class="materials__tag">
                            <input class="materials__checkbox" type="checkbox" name="tag-self" value="self">

                        </label>
                    </li>

                    <li class="materials__tag-item">
                        <label class="materials__tag">
                            <input class="materials__checkbox" type="checkbox" name="tag-nutrition" value="nutrition">
                            <span class="materials__label">Психология питания</span>
                        </label>
                    </li>

                    <li class="materials__tag-item">
                        <label class="materials__tag">
